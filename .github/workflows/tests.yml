name: Tests

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
  workflow_call:

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout audible-plex-downloader
        uses: actions/checkout@v4
        with:
          path: audible-plex-downloader

      - name: Checkout go-audible
        uses: actions/checkout@v4
        with:
          repository: mstrhakr/go-audible
          path: go-audible

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests
        working-directory: audible-plex-downloader
        run: go test -short ./...
