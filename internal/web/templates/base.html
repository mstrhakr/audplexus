{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audplexus</title>
    <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <img src="/static/logo.svg" alt="Audplexus Logo" class="sidebar-logo" />
            <div class="sidebar-brand">
                <h2 class="brand-title">Audplexus</h2>
                <p class="brand-subtitle">Audible to your library</p>
            </div>
        </div>
        <ul class="nav-links">
            <li><a href="/" class="{{if eq .Page "dashboard"}}active{{end}}">Dashboard</a></li>
            <li><a href="/library" class="{{if eq .Page "library"}}active{{end}}">Library</a></li>
            <li><a href="/downloads" class="{{if eq .Page "pipeline"}}active{{end}}">Pipeline</a></li>
            <li><a href="/diagnostics" class="{{if eq .Page "diagnostics"}}active{{end}}">Diagnostics</a></li>
            <li><a href="/settings" class="{{if eq .Page "settings"}}active{{end}}">Settings</a></li>
        </ul>
    </nav>
    <main class="content">
        {{template "content" .}}
    </main>
    <div id="pipeline-activity"></div>
    <script>
    (function() {
        var es = null;
        var reconnectTimer = null;
        var reconnectDelay = 1000;
        var maxReconnectDelay = 15000;
        var stageRateState = {};
        var syncPhaseSubPhasesCache = {};

        function cloneJSON(v) {
            return JSON.parse(JSON.stringify(v));
        }

        function msgHasRatio(msg, current, total) {
            if (!msg || total <= 0) return false;
            var compactMsg = String(msg).replace(/\s+/g, '');
            var ratio = String(current || 0) + '/' + String(total);
            return compactMsg.indexOf(ratio) !== -1;
        }

        function normalizePhaseSubPhases(phase, running) {
            if (!phase || !phase.name) return phase;

            var cached = syncPhaseSubPhasesCache[phase.name] || null;
            var hasIncoming = phase.sub_phases && phase.sub_phases.length > 0;

            if (!hasIncoming && cached && (phase.status === 'complete' || phase.status === 'failed' || !running)) {
                phase.sub_phases = cloneJSON(cached);
                return phase;
            }

            if (!hasIncoming) return phase;

            // Merge missing current/total from cache so final completed rows keep counts.
            var merged = [];
            var seen = {};
            for (var i = 0; i < phase.sub_phases.length; i++) {
                var sp = phase.sub_phases[i] || {};
                var key = (sp.id || '') + '|' + (sp.label || '');
                var fromCache = null;
                if (cached) {
                    for (var j = 0; j < cached.length; j++) {
                        var csp = cached[j] || {};
                        if ((csp.id || '') === (sp.id || '') && (csp.label || '') === (sp.label || '')) {
                            fromCache = csp;
                            break;
                        }
                    }
                }

                if (fromCache) {
                    if (!(sp.total > 0) && (fromCache.total > 0)) sp.total = fromCache.total;
                    if (!(sp.current >= 0) && (fromCache.current >= 0)) sp.current = fromCache.current;
                    if (sp.status === 'complete' && sp.total > 0 && !(sp.current > 0)) sp.current = fromCache.current || sp.total;
                }

                merged.push(sp);
                seen[key] = true;
            }

            // For final states, include cached rows that may be omitted by final payloads.
            if (cached && (phase.status === 'complete' || phase.status === 'failed' || !running)) {
                for (var k = 0; k < cached.length; k++) {
                    var extra = cached[k] || {};
                    var extraKey = (extra.id || '') + '|' + (extra.label || '');
                    if (!seen[extraKey]) merged.push(cloneJSON(extra));
                }
            }

            phase.sub_phases = merged;
            syncPhaseSubPhasesCache[phase.name] = cloneJSON(phase.sub_phases);
            return phase;
        }

        // escHTML escapes a string for safe interpolation into innerHTML.
        // ASINs, titles, and stage names come from upstream services; we
        // never trust them in markup without escaping.
        function escHTML(s) {
            if (s == null) return '';
            return String(s)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        var badgeClass = {
            'downloading': 'badge-warning',
            'decrypting':  'badge-warning',
            'processing':  'badge-warning',
            'moving':      'badge-warning',
            'finalizing':  'badge-warning',
            'converting':  'badge-warning',
            'transcoding': 'badge-warning',
            'waiting_decrypt': 'badge-info',
            'waiting_moving':  'badge-info',
            'queued':      'badge-info',
            'complete':    'badge-success',
            'failed':      'badge-error',
            'new':         'badge-neutral'
        };

        function stageLabel(stage) {
            if (stage === 'moving') return 'moving file';
            if (stage === 'finalizing') return 'finalizing';
            if (stage === 'waiting_decrypt') return 'waiting for decrypt worker';
            if (stage === 'waiting_moving') return 'waiting for moving worker';
            if (stage === 'converting') return 'converting';
            if (stage === 'transcoding') return 'transcoding chapters';
            return stage || '';
        }

        function isVisiblePipelineStage(stage) {
            return stage === 'downloading' ||
                stage === 'decrypting' ||
                stage === 'processing' ||
                stage === 'moving' ||
                stage === 'finalizing' ||
                stage === 'converting' ||
                stage === 'transcoding' ||
                stage === 'waiting_decrypt' ||
                stage === 'waiting_moving';
        }

        function renderPipelinePools(snapshot) {
            var wrap = document.getElementById('pipeline-pools');
            if (!wrap || !snapshot || !snapshot.pools) return;

            var html = '';
            for (var i = 0; i < snapshot.pools.length; i++) {
                var p = snapshot.pools[i];
                var waitingHtml = '';
                if (p.waiting && p.waiting.length > 0) {
                    waitingHtml += '<ul class="pool-waiting-list">';
                    for (var j = 0; j < p.waiting.length && j < 8; j++) {
                        var w = p.waiting[j];
                        waitingHtml += '<li><span class="pool-item-title">' + (w.title || w.asin) + '</span><span class="pool-item-asin">' + w.asin + '</span></li>';
                    }
                    if (p.waiting.length > 8) {
                        waitingHtml += '<li class="pool-more">+' + (p.waiting.length - 8) + ' more</li>';
                    }
                    waitingHtml += '</ul>';
                } else {
                    waitingHtml = '<div class="pool-empty">No waiting items</div>';
                }

                html += '<div class="pool-card">' +
                    '<div class="pool-head"><strong>' + p.label + ' Pool</strong><span class="pool-workers">workers ' + p.workers + '</span></div>' +
                    '<div class="pool-stats"><span>active ' + p.active + '</span><span>queue ' + p.queue_depth + '</span></div>' +
                    waitingHtml +
                '</div>';
            }

            wrap.innerHTML = html;
        }

        function renderSnapshotItems(snapshot) {
            if (!snapshot || !snapshot.items) return;
            var keep = {};
            for (var i = 0; i < snapshot.items.length; i++) {
                var item = snapshot.items[i];
                if (!item || !item.asin) continue;
                keep[item.asin] = true;
                onPipelineEvent({ data: JSON.stringify({
                    type: item.stage === 'queued' ? 'queue' : 'stage',
                    stage: item.stage,
                    asin: item.asin,
                    title: item.title,
                    book_id: item.book_id,
                    progress: item.progress,
                    bytes_written: item.bytes_written,
                    total_bytes: item.total_bytes,
                    speed: item.speed,
                    queue_item: item.stage === 'queued'
                })});
            }

            var cardsWrap = document.getElementById('pipeline-cards');
            if (cardsWrap) {
                var cards = cardsWrap.querySelectorAll('.download-card[id^="pipe-"]');
                for (var c = 0; c < cards.length; c++) {
                    var id = cards[c].id || '';
                    var asin = id.indexOf('pipe-') === 0 ? id.substring(5) : '';
                    if (asin && !keep[asin]) {
                        cards[c].remove();
                    }
                }

                if (!cardsWrap.querySelector('.download-card[id^="pipe-"]') && !document.getElementById('pipe-empty')) {
                    var empty = document.createElement('p');
                    empty.className = 'empty';
                    empty.id = 'pipe-empty';
                    empty.textContent = 'No active downloads';
                    cardsWrap.appendChild(empty);
                }
            }
        }

        function renderQueuePauseState(paused, reason) {
            var toggle = document.getElementById('queue-toggle-btn');
            if (toggle) {
                toggle.setAttribute('data-paused', paused ? '1' : '0');
                toggle.textContent = paused ? 'Resume Queue' : 'Pause Queue';
                toggle.classList.remove('btn-primary', 'btn-secondary');
                toggle.classList.add(paused ? 'btn-primary' : 'btn-secondary');
            }

            var banner = document.getElementById('queue-paused-banner');
            var reasonEl = document.getElementById('queue-paused-reason');
            if (reasonEl) {
                reasonEl.textContent = reason || 'permission issue';
            }
            if (banner) {
                banner.style.display = paused ? '' : 'none';
            }
        }

        function renderSyncPhase(p, opts) {
            opts = opts || {};
            var icon = '&#9675;';
            if (p.status === 'complete') icon = '&#10003;';
            else if (p.status === 'failed') icon = '&#10007;';
            else if (p.status === 'running') icon = '&#9679;';
            else if (p.status === 'skipped') icon = '&#8212;';
            var hasMultipleDestinations = p.sub_phases && p.sub_phases.length > 1;

            var idAttr = opts.id ? ' id="' + opts.id + '"' : '';
            var html = '<div class="sync-phase ' + p.status + '"' + idAttr + '>';
            html += '<div class="phase-main">';
            html += '<span class="phase-icon">' + icon + '</span>';
            html += '<span class="phase-label">' + (p.label || '') + '</span>';
            if (p.message) {
                var detailClass = opts.detailClass ? ' ' + opts.detailClass : '';
                html += '<span class="phase-detail' + detailClass + '">' + p.message + '</span>';
            }
            if (!hasMultipleDestinations && (p.total || 0) > 0) html += '<span class="phase-count">' + (p.current || 0) + ' / ' + p.total + '</span>';
            if (opts.showRunBtn) {
                html += '<button class="phase-run-btn" hx-post="/api/sync/phase/' + p.name + '" hx-target="closest .sync-status-wrap" hx-swap="innerHTML" title="Run ' + (p.label || '') + '">&#9654;</button>';
            }
            html += '</div>';

            // Use throbber for phases with multiple destinations (indeterminate progress)
            // Individual destination progress shown in sub-phases below
            var useThrobber = (p.indeterminate || hasMultipleDestinations) && p.status === 'running';
            
            if (useThrobber) {
                html += '<div class="phase-progress-track indeterminate"><div class="phase-progress-fill"></div></div>';
            } else if (p.status === 'running') {
                var pct = Math.max(0, Math.min(100, Math.round((p.percent || 0) * 100)));
                html += '<div class="phase-progress-track"><div class="phase-progress-fill" style="width:' + pct + '%"></div></div>';
            } else {
                var pct = Math.max(0, Math.min(100, Math.round((p.percent || 0) * 100)));
                html += '<div class="phase-progress-track"><div class="phase-progress-fill" style="width:' + pct + '%"></div></div>';
            }

            if (p.sub_phases && p.sub_phases.length > 0) {
                html += '<div class="sync-sub-phases">';
                for (var si = 0; si < p.sub_phases.length; si++) {
                    var sp = p.sub_phases[si];
                    var spIcon = sp.status === 'complete' ? '&#10003;' : sp.status === 'failed' ? '&#10007;' : sp.status === 'running' ? '&#9679;' : '&#9675;';
                    html += '<div class="sync-sub-phase ' + (sp.status || 'pending') + '">';
                    html += '<span class="sub-phase-icon">' + spIcon + '</span>';
                    html += '<span class="sub-phase-label">' + (sp.label || '') + '</span>';
                    if (sp.message) html += '<span class="sub-phase-detail">' + sp.message + '</span>';
                    if ((sp.total || 0) > 0 && !msgHasRatio(sp.message, sp.current || 0, sp.total)) {
                        html += '<span class="sub-phase-count">' + (sp.current || 0) + ' / ' + sp.total + '</span>';
                    }
                    html += '</div>';
                }
                html += '</div>';
            }

            html += '</div>';
            return html;
        }

        function buildSyncHTML(d, showRunBtn) {
            var headerMsg = '';
            var headerClass = '';
            if (d.running) {
                var modeLabel = d.mode === 'quick' ? 'Quick' : 'Full';
                headerMsg = modeLabel + ' sync in progress';
                headerClass = 'sync-running';
            } else if (d.status === 'failed') {
                headerMsg = 'Sync failed' + (d.error ? ': ' + d.error : '');
                headerClass = 'error';
            } else if (d.status === 'partial') {
                headerMsg = 'Sync finished with errors';
                headerClass = 'warning';
            } else if (d.status === 'complete') {
                headerMsg = d.message || 'Sync complete';
                headerClass = 'success';
            }

            var html = '<div class="sync-status-container">';
            if (headerMsg) {
                html += '<div class="sync-header"><span class="status-msg ' + headerClass + '">' + headerMsg + '</span></div>';
            }
            if (d.phases && d.phases.length > 0) {
                html += '<div class="sync-phases">';
                for (var i = 0; i < d.phases.length; i++) {
                    html += renderSyncPhase(d.phases[i], { id: 'phase-' + d.phases[i].name, showRunBtn: showRunBtn });
                }
                html += '</div>';
            }
            html += '</div>';
            return html;
        }

        function onSyncEvent(e) {
            var d = JSON.parse(e.data);
            var el = document.getElementById('sync-status');
            if (!el) return;

            // Keep last known per-destination progress so completion/final events
            // that omit or clear sub_phases still render final counts.
            if (d.phases && d.phases.length > 0) {
                for (var pi = 0; pi < d.phases.length; pi++) {
                    var cp = d.phases[pi];
                    normalizePhaseSubPhases(cp, d.running);
                }
            }

            if (d.running) {
                // During running state: update individual phases for smooth progress
                var phasesEl = el.querySelector('.sync-phases');
                if (!phasesEl) {
                    el.innerHTML = buildSyncHTML(d, false);
                    return;
                }

                // Update header
                var header = el.querySelector('.status-msg');
                if (header) {
                    var modeLabel = d.mode === 'quick' ? 'Quick' : 'Full';
                    header.className = 'status-msg sync-running';
                    header.textContent = modeLabel + ' sync in progress';
                }

                // Remove any run buttons during active sync
                var btns = el.querySelectorAll('.phase-run-btn');
                for (var b = 0; b < btns.length; b++) btns[b].remove();

                // Update or add each phase
                if (d.phases && d.phases.length > 0) {
                    for (var i = 0; i < d.phases.length; i++) {
                        var p = d.phases[i];
                        var phaseId = 'phase-' + p.name;
                        var phaseEl = phasesEl.querySelector('[id="' + phaseId + '"]');

                        if (!phaseEl) {
                            // New phase: create the full element
                            var phaseHTML = renderSyncPhase(p, { id: phaseId, showRunBtn: false });
                            phasesEl.insertAdjacentHTML('beforeend', phaseHTML);
                        } else {
                            // Existing phase: surgical update only (never touch progress-track to avoid restarting throbber)
                            phaseEl.className = 'sync-phase ' + p.status;

                            // Update phase-main (icon, label, message, count)
                            var mainEl = phaseEl.querySelector('.phase-main');
                            if (mainEl) {
                                var icon = '&#9675;';
                                if (p.status === 'complete') icon = '&#10003;';
                                else if (p.status === 'failed') icon = '&#10007;';
                                else if (p.status === 'running') icon = '&#9679;';
                                else if (p.status === 'skipped') icon = '&#8212;';

                                var iconEl = mainEl.querySelector('.phase-icon');
                                if (iconEl) iconEl.innerHTML = icon;

                                var labelEl = mainEl.querySelector('.phase-label');
                                if (labelEl) labelEl.textContent = p.label || '';

                                var detailEl = mainEl.querySelector('.phase-detail');
                                if (p.message) {
                                    if (!detailEl) {
                                        var newDetailEl = document.createElement('span');
                                        newDetailEl.className = 'phase-detail' + (p.status === 'failed' ? ' error' : '');
                                        newDetailEl.textContent = p.message;
                                        mainEl.appendChild(newDetailEl);
                                    } else {
                                        detailEl.textContent = p.message;
                                        detailEl.className = 'phase-detail' + (p.status === 'failed' ? ' error' : '');
                                    }
                                } else if (detailEl) {
                                    detailEl.remove();
                                }

                                // For multi-destination phases, sub-phase rows already show progress.
                                // Keep top count hidden there to avoid jumping between destinations.
                                var countEl = mainEl.querySelector('.phase-count');
                                var hasMultipleDestinations = p.sub_phases && p.sub_phases.length > 1;
                                if (!hasMultipleDestinations && (p.total || 0) > 0) {
                                    var countText = (p.current || 0) + ' / ' + p.total;
                                    if (!countEl) {
                                        countEl = document.createElement('span');
                                        countEl.className = 'phase-count';
                                        mainEl.appendChild(countEl);
                                    }
                                    countEl.textContent = countText;
                                } else if (countEl) {
                                    countEl.remove();
                                }
                            }

                            // Update sub-phases if present
                            if (p.sub_phases && p.sub_phases.length > 0) {
                                var subPhasesEl = phaseEl.querySelector('.sync-sub-phases');
                                if (!subPhasesEl) {
                                    subPhasesEl = document.createElement('div');
                                    subPhasesEl.className = 'sync-sub-phases';
                                    phaseEl.appendChild(subPhasesEl);
                                    
                                    // First time sub_phases appear: update progress-track to use throbber
                                    if (p.status === 'running' && p.sub_phases.length > 1) {
                                        var progressTrack = phaseEl.querySelector('.phase-progress-track');
                                        if (progressTrack && !progressTrack.classList.contains('indeterminate')) {
                                            progressTrack.classList.add('indeterminate');
                                            progressTrack.style.width = '';
                                            var fill = progressTrack.querySelector('.phase-progress-fill');
                                            if (fill) fill.style.width = '';
                                        }
                                    }
                                }

                                // Rebuild sub-phases (simpler since they change more frequently)
                                subPhasesEl.innerHTML = '';
                                for (var si = 0; si < p.sub_phases.length; si++) {
                                    var sp = p.sub_phases[si];
                                    var spIcon = sp.status === 'complete' ? '&#10003;' : sp.status === 'failed' ? '&#10007;' : sp.status === 'running' ? '&#9679;' : '&#9675;';
                                    var spHTML = '<div class="sync-sub-phase ' + (sp.status || 'pending') + '">' +
                                        '<span class="sub-phase-icon">' + spIcon + '</span>' +
                                        '<span class="sub-phase-label">' + (sp.label || '') + '</span>';
                                    if (sp.message) spHTML += '<span class="sub-phase-detail">' + sp.message + '</span>';
                                    if ((sp.total || 0) > 0 && !msgHasRatio(sp.message, sp.current || 0, sp.total)) {
                                        spHTML += '<span class="sub-phase-count">' + (sp.current || 0) + ' / ' + sp.total + '</span>';
                                    }
                                    spHTML += '</div>';
                                    subPhasesEl.insertAdjacentHTML('beforeend', spHTML);
                                }
                            } else {
                                var subPhasesEl = phaseEl.querySelector('.sync-sub-phases');
                                if (subPhasesEl) subPhasesEl.remove();
                            }
                            // NOTE: Never touch progress-track — leave throbber/bar animation stable
                        }
                    }
                }
            } else {
                // Not running: rebuild full view with run buttons
                el.innerHTML = buildSyncHTML(d, true);
                if (window.htmx) htmx.process(el);
            }
        }

        function fmtBytes(b) {
            if (b <= 0) return '0 B';
            var k = 1024, i = Math.floor(Math.log(b) / Math.log(k));
            var units = ['B','KB','MB','GB','TB'];
            return (b / Math.pow(k, i)).toFixed(1) + ' ' + units[i];
        }

        function fmtETA(written, total, speed) {
            if (speed <= 0 || written >= total) return '';
            var secs = Math.round((total - written) / speed);
            if (secs < 60) return secs + 's';
            if (secs < 3600) return Math.floor(secs/60) + 'm ' + (secs%60) + 's';
            return Math.floor(secs/3600) + 'h ' + Math.floor((secs%3600)/60) + 'm';
        }

        function getStageThroughput(d, stage) {
            if (!d || !d.asin || !(d.bytes_written > 0)) return 0;
            if (stage !== 'decrypting' && stage !== 'processing') return 0;

            var key = d.asin + ':' + stage;
            var now = Date.now();
            var prev = stageRateState[key];
            stageRateState[key] = { bytes: d.bytes_written, ts: now };
            if (!prev) return 0;

            var deltaBytes = d.bytes_written - prev.bytes;
            var deltaMs = now - prev.ts;
            if (deltaBytes <= 0 || deltaMs < 250) return 0;
            return (deltaBytes * 1000) / deltaMs;
        }

        function clearStageRateState(asin) {
            if (!asin) return;
            for (var k in stageRateState) {
                if (k.indexOf(asin + ':') === 0) delete stageRateState[k];
            }
        }

        function isLibraryCancelableStage(stage) {
            return stage === 'downloading' ||
                stage === 'decrypting' ||
                stage === 'processing' ||
                stage === 'moving' ||
                stage === 'converting' ||
                stage === 'transcoding';
        }

        function syncLibraryRowCancelStates(root) {
            var scope = root && root.querySelectorAll ? root : document;
            var rows = scope.querySelectorAll('.table-actions[data-asin]');
            for (var i = 0; i < rows.length; i++) {
                var wrap = rows[i];
                var bookID = wrap.getAttribute('data-book-id');
                var asin = wrap.getAttribute('data-asin');
                if (!bookID && !asin) continue;

                var badge = bookID ? document.getElementById('status-book-' + bookID) : null;
                if (!badge) continue;

                var stage = (badge.textContent || '').trim().toLowerCase();
                setLibraryRowCancelState(bookID, asin, isLibraryCancelableStage(stage));
            }
        }

        function setLibraryRowCancelState(bookID, asin, showCancel) {
            var wrap = null;
            if (bookID) {
                wrap = document.getElementById('book-actions-' + bookID);
            }
            if (!wrap && asin) {
                wrap = document.querySelector('.table-actions[data-asin="' + asin + '"]');
            }
            if (!wrap) return;

            var defaultWrap = wrap.querySelector('.library-row-default-actions');
            var cancelWrap = wrap.querySelector('.library-row-cancel-action');
            if (defaultWrap) defaultWrap.classList.toggle('is-hidden', showCancel);
            if (cancelWrap) cancelWrap.classList.toggle('is-hidden', !showCancel);
        }

        function onPipelineEvent(e) {
            var d = JSON.parse(e.data);

            if (d.type === 'pool_state') {
                renderPipelinePools(d);
                renderSnapshotItems(d);
                renderQueuePauseState(!!d.queue_paused, d.queue_pause_reason || '');
                return;
            }

            if (d.type === 'paused' || d.type === 'resumed') {
                var isPaused = d.type === 'paused';
                renderQueuePauseState(isPaused, d.error || '');

                var statusEl = document.getElementById('dl-status');
                if (statusEl) {
                    if (isPaused) {
                        statusEl.textContent = 'Queue paused: ' + (d.error || 'permission issue');
                        statusEl.className = 'status-msg error';
                    } else {
                        statusEl.textContent = 'Queue resumed';
                        statusEl.className = 'status-msg success';
                    }
                }
            }

            // Helper: increment/decrement a counter element
            function adj(id, delta) {
                var el = document.getElementById(id);
                if (!el) return;
                var v = parseInt(el.textContent || '0') + delta;
                el.textContent = v < 0 ? 0 : v;
            }

            // --- Dashboard stat updates ---
            if (d.type === 'started') {
                adj('stat-active-dl', 1);
                adj('stat-pending-dl', -1);
            }
            if (d.type === 'complete') {
                adj('stat-active-dl', -1);
                adj('stat-complete', 1);
            }
            if (d.type === 'failed') {
                adj('stat-active-dl', -1);
                adj('stat-failed-dl', 1);
            }

            // --- Library row status badge updates ---
            var badge = document.getElementById('status-book-' + d.book_id);
            if (badge) {
                var stage = d.stage || d.type;
                badge.textContent = stageLabel(stage);
                badge.className = 'badge ' + (badgeClass[stage] || 'badge-neutral');

                if (isLibraryCancelableStage(stage)) {
                    setLibraryRowCancelState(d.book_id, d.asin, true);
                } else if (stage === 'complete' || stage === 'failed') {
                    setLibraryRowCancelState(d.book_id, d.asin, false);
                }
            }

            // --- Pipeline page: active pipeline card ---
            var activity = document.getElementById('pipeline-cards');
            if (activity) {
                var card = document.getElementById('pipe-' + d.asin);
                if (d.type === 'started' || d.type === 'progress' || d.type === 'stage' || d.type === 'queue') {
                    var stage = d.stage || (d.type === 'started' ? 'downloading' : '');
                    var isActiveStage = isVisiblePipelineStage(stage);

                    // Keep cards focused on active work only; queued/non-active states should not linger.
                    if (!isActiveStage) {
                        clearStageRateState(d.asin);
                        if (card) card.remove();
                        return;
                    }

                    // Remove pending row if present
                    var pendingRow = document.getElementById('pending-' + d.asin);
                    if (pendingRow) { pendingRow.remove(); adj('pending-count', -1); }
                    var emptyRow = document.getElementById('pipe-empty');
                    if (emptyRow) emptyRow.remove();

                    if (!card) {
                        card = document.createElement('div');
                        card.id = 'pipe-' + d.asin;
                        card.className = 'download-card';
                        activity.appendChild(card);
                    }
                    var pct = Math.round((d.progress || 0) * 100);
                    var label = d.title || d.asin;
                    var stageText = stageLabel(stage);

                    var details = '';
                    if (stage === 'downloading' || stage === 'decrypting' || stage === 'processing' || stage === 'moving') {
                        var sizeInfo = '';
                        if (d.total_bytes > 0) {
                            sizeInfo = fmtBytes(d.bytes_written) + ' / ' + fmtBytes(d.total_bytes);
                        }
                        var speedInfo = '';
                        if (stage === 'downloading' && d.speed > 0) {
                            speedInfo = fmtBytes(d.speed) + '/s';
                        } else if (stage === 'moving' && d.speed > 0) {
                            speedInfo = fmtBytes(d.speed) + '/s';
                        } else if (stage === 'decrypting' || stage === 'processing') {
                            var throughput = getStageThroughput(d, stage);
                            if (throughput > 0) {
                                speedInfo = fmtBytes(throughput) + '/s';
                            }
                            if (d.speed > 0) {
                                speedInfo += (speedInfo ? ' (' : '') + d.speed.toFixed(2) + 'x' + (speedInfo ? ')' : '');
                            }
                        } else if (stage !== 'downloading' && d.speed > 0) {
                            speedInfo = d.speed.toFixed(2) + 'x';
                        }
                        var eta = d.speed > 0 && d.total_bytes > 0 && (stage === 'downloading' || stage === 'moving') ? fmtETA(d.bytes_written, d.total_bytes, d.speed) : '';
                        var parts = [];
                        if (sizeInfo) parts.push(sizeInfo);
                        if (speedInfo) parts.push(speedInfo);
                        if (eta) parts.push('ETA ' + eta);
                        details = parts.length > 0 ? '<div class="dl-details">' + parts.join(' &middot; ') + '</div>' : '';
                    } else if (stage === 'waiting_decrypt' || stage === 'waiting_moving') {
                        var waitingParts = [];
                        if (d.total_bytes > 0) {
                            waitingParts.push(fmtBytes(d.total_bytes) + ' completed');
                        }
                        details = waitingParts.length > 0 ? '<div class="dl-details">' + waitingParts.join(' &middot; ') + '</div>' : '';
                    }

                    var bClass = badgeClass[stage] || 'badge-warning';
                    var isWaiting = (stage === 'waiting_decrypt' || stage === 'waiting_moving');
                    var isFinalizing = (stage === 'finalizing');
                    var cancellable = (stage === 'downloading' || stage === 'decrypting' || stage === 'processing' || stage === 'moving' || stage === 'converting' || stage === 'transcoding');

                    // Once the user has clicked Cancel we mark the card so
                    // subsequent SSE redraws don't restore the active button
                    // (which would let them click it again before the server
                    // catches up). The card sticks around until the failed/
                    // complete event arrives.
                    if (card && card.getAttribute('data-cancelling') === '1') {
                        return;
                    }

                    var cancelBtn = cancellable
                        ? '<div class="dl-info-actions"><button class="btn btn-small btn-danger pipe-cancel" data-asin="' + escHTML(d.asin) + '">Cancel</button></div>'
                        : '<div class="dl-info-actions"></div>';
                    var bottomEl = '';
                    if (isFinalizing) {
                        bottomEl = '<div class="progress-throbber"><div class="progress-throbber-bar"></div></div>';
                    } else if (stage === 'downloading' || stage === 'decrypting' || stage === 'processing' || stage === 'moving' || stage === 'converting' || stage === 'transcoding' || stage === 'waiting_decrypt' || stage === 'waiting_moving') {
                        bottomEl = '<div class="progress-bar"><div class="progress-fill" style="width:' + pct + '%"></div></div>';
                    }
                    card.innerHTML = '<div class="dl-info"><strong>' + escHTML(label) + '</strong>' +
                        '<span class="badge ' + bClass + '">' + escHTML(stageText) +
                        (!isWaiting && !isFinalizing && pct > 0 ? ' ' + pct + '%' : '') +
                        '</span>' + cancelBtn + '</div>' + details + bottomEl;
                } else if (d.type === 'complete') {
                    clearStageRateState(d.asin);
                    if (card) card.remove();
                    // Add row to completed table
                    var cb = document.getElementById('complete-body');
                    if (cb) {
                        var empty = document.getElementById('complete-empty');
                        if (empty) empty.remove();
                        var tr = document.createElement('tr');
                        var label = d.title || d.asin;
                        tr.innerHTML = '<td>' + d.asin + '</td><td>' + label + '</td><td>just now</td>';
                        cb.insertBefore(tr, cb.firstChild);
                        adj('complete-count', 1);
                    }
                } else if (d.type === 'failed') {
                    clearStageRateState(d.asin);
                    if (card) card.remove();
                    // Add row to failed table
                    var fb = document.getElementById('failed-body');
                    if (fb) {
                        var empty = document.getElementById('failed-empty');
                        if (empty) empty.remove();
                        var tr = document.createElement('tr');
                        var label = d.title || d.asin;
                        var errMsg = d.error || 'unknown error';
                        tr.innerHTML = '<td>' + d.asin + '</td><td class="error-text">' + errMsg + '</td><td>' + label + '</td>';
                        fb.insertBefore(tr, fb.firstChild);
                        adj('failed-count', 1);
                    }
                }
            }
        }

        function clearReconnectTimer() {
            if (reconnectTimer !== null) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
        }

        function closeEventSource() {
            if (es) {
                es.close();
                es = null;
            }
        }

        function scheduleReconnect() {
            clearReconnectTimer();
            reconnectTimer = setTimeout(function() {
                reconnectTimer = null;
                connectEventSource();
            }, reconnectDelay);
            reconnectDelay = Math.min(maxReconnectDelay, reconnectDelay * 2);
        }

        function connectEventSource() {
            if (document.visibilityState === 'hidden') {
                return;
            }

            // Pull one full snapshot so reconnects never miss final 100% transitions.
            fetch('/api/pipeline/state')
                .then(function(r) { return r.json(); })
                .then(function(state) {
                    renderPipelinePools(state);
                    renderSnapshotItems(state);
                    renderQueuePauseState(!!state.queue_paused, state.queue_pause_reason || '');
                })
                .catch(function() {});

            closeEventSource();
            es = new EventSource('/api/events');

            es.onopen = function() {
                reconnectDelay = 1000;
                clearReconnectTimer();
            };

            es.addEventListener('pipeline', onPipelineEvent);
            es.addEventListener('sync', onSyncEvent);

            es.onerror = function() {
                closeEventSource();
                scheduleReconnect();
            };
        }

        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') {
                closeEventSource();
                clearReconnectTimer();
                return;
            }
            connectEventSource();
        });

        window.addEventListener('beforeunload', function() {
            closeEventSource();
            clearReconnectTimer();
        });

        var queueToggleBtn = document.getElementById('queue-toggle-btn');
        if (queueToggleBtn) {
            queueToggleBtn.addEventListener('click', function() {
                var paused = queueToggleBtn.getAttribute('data-paused') === '1';
                var action = paused ? 'resume' : 'pause';
                queueToggleBtn.disabled = true;
                fetch('/api/downloads/' + action, { method: 'POST' })
                    .then(function(r) {
                        if (!r.ok) throw new Error('request failed');
                        return r.json();
                    })
                    .then(function(resp) {
                        var isPaused = !!resp.paused;
                        renderQueuePauseState(isPaused, '');
                        var statusEl = document.getElementById('dl-status');
                        if (statusEl) {
                            statusEl.textContent = isPaused ? 'Queue paused' : 'Queue resumed';
                            statusEl.className = isPaused ? 'status-msg error' : 'status-msg success';
                        }
                    })
                    .catch(function() {
                        var statusEl = document.getElementById('dl-status');
                        if (statusEl) {
                            statusEl.textContent = 'Failed to update queue state';
                            statusEl.className = 'status-msg error';
                        }
                    })
                    .finally(function() {
                        queueToggleBtn.disabled = false;
                    });
            });
        }

        // Delegated handler for the Cancel button on active pipeline cards.
        document.addEventListener('click', function(ev) {
            var btn = ev.target.closest && ev.target.closest('.pipe-cancel');
            if (!btn) return;
            var asin = btn.getAttribute('data-asin');
            if (!asin) return;
            if (!confirm('Cancel this in-flight pipeline item?')) return;
            btn.disabled = true;
            btn.textContent = 'Cancelling…';
            // Mark the card so the SSE redraw loop doesn't recreate a
            // fresh active Cancel button on the next progress event.
            var card = document.getElementById('pipe-' + asin);
            if (card) card.setAttribute('data-cancelling', '1');
            fetch('/api/downloads/cancel-active/' + encodeURIComponent(asin), { method: 'POST' })
                .catch(function() {
                    // Request failed to reach the server (network error, etc.) so
                    // the server never cancelled the item. Roll back the frozen state
                    // so SSE progress events resume updating the card normally.
                    if (card) card.removeAttribute('data-cancelling');
                    btn.disabled = false;
                    btn.textContent = 'Cancel';
                });
        });

        syncLibraryRowCancelStates();

        document.body.addEventListener('htmx:afterSwap', function(ev) {
            syncLibraryRowCancelStates(ev.target);
        });

        connectEventSource();
    })();
    </script>
</body>
</html>
