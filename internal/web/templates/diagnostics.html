{{define "content"}}
<h1>Diagnostics</h1>
<p>Destination-first diagnostics for already-downloaded books. Resolution order: targeted scan first, redownload last resort.</p>

<div id="diag-summary" class="diagnostics-summary">
    <div class="loading">Loading diagnostics...</div>
</div>

<div class="actions-bar">
    <button class="btn btn-primary" onclick="loadDiagnostics()">Refresh</button>
    <button id="diag-rescan-all" class="btn btn-secondary" onclick="rescanAllIssues()">Rescan All Issues</button>
    <button id="diag-redownload-all" class="btn btn-danger" onclick="redownloadAllListed()">Redownload All Listed</button>
    <span id="diag-status"></span>
</div>

<h2>Issue Inbox</h2>
<div id="diag-issues">
    <p class="empty">Loading...</p>
</div>

<script>
let diagData = null;

async function loadDiagnostics() {
    setBulkButtonsEnabled(false);
    const summary = document.getElementById('diag-summary');
    const issues = document.getElementById('diag-issues');
    summary.innerHTML = '<div class="loading">Loading diagnostics...</div>';
    issues.innerHTML = '<div class="loading">Evaluating destinations...</div>';
    try {
        const r = await fetch('/api/diagnostics/compare');
        if (!r.ok) throw new Error('Failed: ' + r.statusText);
        diagData = await r.json();
        renderSummary(diagData);
        renderIssues(diagData.items || []);
        setBulkButtonsEnabled(true);
    } catch (err) {
        summary.innerHTML = '<div class="error">' + escapeHtml(err.message) + '</div>';
        issues.innerHTML = '';
        setBulkButtonsEnabled(false);
    }
}

function setBulkButtonsEnabled(enabled) {
    const hasItems = !!(diagData && Array.isArray(diagData.items) && diagData.items.length > 0);
    const canRun = enabled && hasItems;
    const rescanBtn = document.getElementById('diag-rescan-all');
    const redownloadBtn = document.getElementById('diag-redownload-all');
    if (rescanBtn) rescanBtn.disabled = !canRun;
    if (redownloadBtn) redownloadBtn.disabled = !canRun;
}

function renderSummary(data) {
    const summary = document.getElementById('diag-summary');
    const cards = (data.destinations || []).map(d => {
        const cls = !d.fetch_healthy ? 'stat-error' : (d.missing > 0 ? 'stat-warning' : '');
        return `<div class="stat-card ${cls}">
            <div class="stat-value">${d.matched}</div>
            <div class="stat-label">${escapeHtml(d.name)}</div>
            <div class="stat-sub">Missing ${d.missing} • Unknown ${d.unknown}</div>
            ${d.fetch_error ? `<div class="stat-sub error">${escapeHtml(d.fetch_error)}</div>` : ''}
        </div>`;
    }).join('');

    summary.innerHTML = `<div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value">${data.complete_books}</div>
            <div class="stat-label">Complete Books</div>
            <div class="stat-sub">Issue Books ${data.issue_books}</div>
        </div>
        <div class="stat-card ${data.disk_missing > 0 ? 'stat-warning' : ''}">
            <div class="stat-value">${data.disk_missing}</div>
            <div class="stat-label">Missing On Disk</div>
            <div class="stat-sub">Generated ${new Date(data.generated_at).toLocaleTimeString()}</div>
        </div>
        ${cards}
    </div>`;
}

function renderIssues(items) {
    const root = document.getElementById('diag-issues');
    if (!items.length) {
        root.innerHTML = '<p class="success">No issues detected.</p>';
        setBulkButtonsEnabled(false);
        return;
    }
    setBulkButtonsEnabled(true);
    let html = `<table class="data-table"><thead><tr>
        <th>Book</th><th>Status</th><th>Issue</th><th>Actions</th>
    </tr></thead><tbody>`;

    for (const item of items) {
        const statuses = (item.destination_statuses || []).map(s => {
            const cls = s.status === 'matched' ? 'badge-success' : (s.status === 'missing' ? 'badge-warning' : 'badge-neutral');
            const detail = s.match_method ? ` (${s.match_method})` : '';
            const reason = s.reason ? `<div class="dest-detail">${escapeHtml(s.reason)}</div>` : '';
            return `<div class="dest-row"><span class="dest-name">${escapeHtml(s.destination_name)}</span><span class="badge ${cls}">${escapeHtml(s.status)}</span><span class="text-muted">${escapeHtml(detail)}</span>${reason}</div>`;
        }).join('');

        html += `<tr>
            <td><a href="/library/${item.asin}">${escapeHtml(item.title)}</a><br><small class="text-muted">${item.asin}</small></td>
            <td>${statuses}</td>
            <td class="issue-text">${escapeHtml(item.issue_summary)}</td>
            <td class="diag-actions-cell">
                ${item.can_targeted_scan ? `<button class="btn btn-small btn-primary" onclick="triggerTargetedScan('${item.asin}')">Targeted Scan</button>` : ''}
                ${item.can_redownload ? `<button class="btn btn-small btn-secondary" onclick="redownloadBook('${item.asin}', '${escapeJs(item.title)}')">Redownload (Last Resort)</button>` : ''}
            </td>
        </tr>`;
    }
    html += '</tbody></table>';
    root.innerHTML = html;
}

async function triggerTargetedScan(asin) {
    const status = document.getElementById('diag-status');
    status.innerHTML = '<span class="loading">Triggering scan...</span>';
    try {
        const r = await fetch('/api/diagnostics/targeted-scan', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ asin })
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'scan failed');
        status.innerHTML = '<span class="success">' + escapeHtml(data.message || 'scan queued') + '</span>';
    } catch (err) {
        status.innerHTML = '<span class="error">' + escapeHtml(err.message) + '</span>';
    }
}

async function redownloadBook(asin, title) {
    if (!confirm('Last resort: redownload "' + title + '"? This deletes local files first.')) return;
    const status = document.getElementById('diag-status');
    status.innerHTML = '<span class="loading">Queueing redownload...</span>';
    try {
        const r = await fetch('/api/downloads/redownload/' + encodeURIComponent(asin), { method: 'POST' });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'redownload failed');
        status.innerHTML = '<span class="success">' + escapeHtml(data.message || 'queued') + '</span>';
        setTimeout(loadDiagnostics, 800);
    } catch (err) {
        status.innerHTML = '<span class="error">' + escapeHtml(err.message) + '</span>';
    }
}

async function runBulkAction(items, label, actionFn) {
    const status = document.getElementById('diag-status');
    setBulkButtonsEnabled(false);
    let ok = 0;
    let failed = 0;

    for (let i = 0; i < items.length; i++) {
        status.innerHTML = `<span class="loading">${label}: ${i + 1}/${items.length}</span>`;
        try {
            const success = await actionFn(items[i]);
            if (success) ok++; else failed++;
        } catch (_) {
            failed++;
        }
    }

    const cls = failed === 0 ? 'success' : 'warning';
    status.innerHTML = `<span class="${cls}">${label} complete: ${ok} succeeded, ${failed} failed</span>`;
    await loadDiagnostics();
}

async function rescanAllIssues() {
    if (!diagData || !Array.isArray(diagData.items) || diagData.items.length === 0) return;
    const scanItems = diagData.items.filter(i => i.can_targeted_scan);
    if (scanItems.length === 0) {
        document.getElementById('diag-status').innerHTML = '<span class="warning">No listed items can be rescanned</span>';
        return;
    }
    if (!confirm('Run targeted scan for all listed issue items (' + scanItems.length + ')?')) return;

    await runBulkAction(scanItems, 'Rescan all', async (item) => {
        const r = await fetch('/api/diagnostics/targeted-scan', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ asin: item.asin })
        });
        return r.ok;
    });
}

async function redownloadAllListed() {
    if (!diagData || !Array.isArray(diagData.items) || diagData.items.length === 0) return;
    const redownloadItems = diagData.items.filter(i => i.can_redownload);
    if (redownloadItems.length === 0) {
        document.getElementById('diag-status').innerHTML = '<span class="warning">No listed items can be redownloaded</span>';
        return;
    }
    if (!confirm('Last resort: redownload all listed issue items (' + redownloadItems.length + ')? This deletes local files first.')) return;

    await runBulkAction(redownloadItems, 'Redownload all', async (item) => {
        const r = await fetch('/api/downloads/redownload/' + encodeURIComponent(item.asin), { method: 'POST' });
        return r.ok;
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text || '';
    return div.innerHTML;
}

function escapeJs(text) {
    return (text || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

document.addEventListener('DOMContentLoaded', loadDiagnostics);
</script>

<style>
.diagnostics-summary { margin-bottom: 1.2rem; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 0.8rem; }
.stat-card { background: var(--surface-color, #1e1e1e); border: 1px solid var(--border-color, #333); border-radius: 8px; padding: 0.8rem; }
.stat-card.stat-warning { border-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
.stat-card.stat-error { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }
.stat-value { font-size: 1.6rem; font-weight: 700; color: var(--primary-color, #60a5fa); }
.stat-label { margin-top: 0.2rem; font-size: 0.92rem; }
.stat-sub { margin-top: 0.2rem; font-size: 0.78rem; color: var(--text-secondary, #888); }
.dest-row { margin-bottom: 0.35rem; }
.dest-name { display: inline-block; min-width: 9rem; }
.dest-detail { font-size: 0.75rem; color: var(--text-secondary, #888); }
.issue-text { color: #f59e0b; }
.badge-neutral { background: rgba(107, 114, 128, 0.2); color: #d1d5db; border: 1px solid #6b7280; }
.btn-secondary { background: #374151; color: #fff; }
.diag-actions-cell { min-width: 220px; display: grid; gap: 0.45rem; }
</style>
{{end}}
