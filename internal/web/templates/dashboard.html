{{define "content"}}
<h1>Dashboard</h1>

<div class="actions-bar">
    <div class="btn-group">
        <button hx-post="/api/sync/quick" hx-swap="none" class="btn btn-secondary" title="Update Audible library only — fast check for new books">
            Quick Sync
        </button>
        <button hx-post="/api/sync/full" hx-swap="none" class="btn btn-primary" title="Full sync: Audible + filesystem scan + Plex library check">
            Full Sync
        </button>
    </div>
    <button hx-post="/api/downloads/queue-all" hx-swap="none" class="btn btn-secondary">
        Queue All New
    </button>
    <button hx-post="/api/downloads/retry-all" hx-swap="none" class="btn btn-danger">
        Retry All Failed
    </button>
</div>


<div id="dashboard-summary" hx-get="/api/dashboard/summary" hx-trigger="load, every 12s queue:last" hx-swap="innerHTML">
    {{template "dashboard_summary.html" .}}
</div>

<h2>Worker Pools</h2>
<div id="pipeline-pools" class="pool-grid"></div>

<h2>Active Pipeline</h2>
<div id="pipeline-cards"></div>

<div id="dashboard-downloads" hx-get="/api/dashboard/downloads" hx-trigger="load, every 12s queue:last" hx-swap="innerHTML">
    {{template "dashboard_downloads.html" .}}
</div>
{{end}}
