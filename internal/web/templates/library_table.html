{{define "library_table.html"}}
<p class="result-count">{{.Total}} books</p>
<table class="data-table">
    <thead>
        <tr>
            <th>Cover</th>
            <th>Title</th>
            <th>Author</th>
            <th>Duration</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {{range .Books}}
        {{template "library_row.html" (dict "Book" . "BookAction" (index $.BookActions .ID))}}
        {{else}}
        <tr><td colspan="6" class="empty">No books found</td></tr>
        {{end}}
    </tbody>
</table>
{{end}}
